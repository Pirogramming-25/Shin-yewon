{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pirostagram</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div id="wrap">
        <aside class="sidebar">
            <a href="{% url 'posts:home' %}" class="nav-logo">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                    <circle cx="12" cy="12" r="4"></circle>
                    <circle cx="17.5" cy="6.5" r="1"></circle>
                </svg>
                <span>Pirostagram</span>
            </a>

            <nav class="menu">
                <a href="{% url 'posts:home' %}">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 10.5L12 3l9 7.5V21h-6v-6H9v6H3z"></path>
                    </svg>
                    <span>홈</span>
                </a>

                <a href="{% url 'posts:user_search' %}">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="M16.5 16.5L21 21"></path>
                    </svg>
                    <span>검색</span>
                </a>

                <a href="{% url 'posts:post_create' %}">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                        <path d="M12 8v8"></path>
                        <path d="M8 12h8"></path>
                    </svg>
                    <span>만들기</span>
                </a>

                {% if user.is_authenticated %}
                    <a href="{% url 'posts:profile' user.username %}">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"></path>
                        </svg>
                        <span>프로필</span>
                    </a>
                {% else %}
                    <a href="/admin/login/">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"></path>
                        </svg>
                        <span>프로필</span>
                    </a>
                {% endif %}
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        function openStory(imageUrl) {
            const modal = document.getElementById('storyModal');
            const modalImage = document.getElementById('storyModalImage');

            modalImage.src = imageUrl;
            modal.style.display = 'flex';
        }

        function closeStory() {
            const modal = document.getElementById('storyModal');
            const modalImage = document.getElementById('storyModalImage');

            modal.style.display = 'none';
            modalImage.src = '';
        }

        function toggleReplyForm(commentId) {
            const form = document.getElementById('reply-form-' + commentId);

            if (form.style.display === 'flex') {
                form.style.display = 'none';
            } else {
                form.style.display = 'flex';
            }
        }

        function getCookie(name) {
            let cookieValue = null;

            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');

                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();

                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }

            return cookieValue;
        }

        const csrftoken = getCookie('csrftoken');
        const likeButtons = document.querySelectorAll('.like-btn');

        likeButtons.forEach(function(button) {
            button.addEventListener('click', function() {
                const postId = button.dataset.postId;
                const likeUrl = button.dataset.likeUrl;

                fetch(likeUrl, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrftoken,
                        'X-Requested-With': 'XMLHttpRequest',
                    },
                })
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.is_liked) {
                        button.textContent = '♥';
                        button.classList.add('liked');
                    } else {
                        button.textContent = '♡';
                        button.classList.remove('liked');
                    }

                    const likeCount = document.getElementById('like-count-' + postId);
                    likeCount.textContent = data.like_count;
                });
            });
        });
    </script>
</body>
</html>
