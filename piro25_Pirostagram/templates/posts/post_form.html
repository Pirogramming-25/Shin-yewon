{% extends 'base.html' %}

{% block content %}
<section class="form-section">
    {% if post %}
        <h2>게시글 수정하기</h2>
    {% else %}
        <h2>게시글 만들기</h2>  
    {% endif %}

    <form action="" method="POST" enctype="multipart/form-data" class="post-form">
        {% csrf_token %}

        <div class="form-group">
            <label>게시글 이미지</label>
            {{ form.image }}
        </div>

        <div class="form-group">
            <label>내용</label>
            {{ form.content }}
        </div>

        {% if post %}
            <button type="submit" class="submit-btn">수정하기</button>
        {% else %}
            <button type="submit" class="submit-btn">올리기</button>
        {% endif %}
    </form>
</section>
{% endblock %}
