{% extends 'ideas/base.html' %}

{% block content %}
    <h2 class="page-title">DevTool Delete</h2>

    <div class="detail-box">
        <p>정말 "{{ devtool.name }}" 개발툴을 삭제하시겠습니까?</p>

        <form method="POST">
            {% csrf_token %}
            <button class="btn danger" type="submit">삭제</button>
            <a class="btn" href="{% url 'ideas:devtool_detail' devtool.id %}">취소</a>
        </form>
    </div>
{% endblock %}
