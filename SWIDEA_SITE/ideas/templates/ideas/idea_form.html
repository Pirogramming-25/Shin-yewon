{% extends 'ideas/base.html' %}

{% block content %}
    {% if idea %}
        <h2 class="page-title">Idea Update</h2>
    {% else %}
        <h2 class="page-title">Idea Register</h2>
    {% endif %}

    <div class="form-box">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn primary" type="submit">SUBMIT</button>
        </form>

        <br>

        <a class="btn" href="{% url 'ideas:idea_list' %}">목록으로</a>
    </div>
{% endblock %}
